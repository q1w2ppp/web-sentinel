<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL · 网络哨兵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   SWISS MODERN — 12 Col Grid · Red/Black/White
   ═══════════════════════════════════════════ */

:root {
  --red:    #E03A3E;
  --black:  #111111;
  --white:  #FFFFFF;
  --gray-1: #F5F5F5;
  --gray-2: #E0E0E0;
  --gray-3: #999999;
  --grid:   12;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--white);
  color: var(--black);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── 12 Column Grid ── */
.layout {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 0;
  max-width: 1440px;
  min-height: 100vh;
}

/* ── Left Zone: col 1-5 ── */
.zone--left {
  grid-column: 2 / 7;
  padding: 64px 48px 64px 0;
  border-right: 1px solid var(--black);
}

/* ── Right Zone: col 7-12 ── */
.zone--right {
  grid-column: 7 / 12;
  padding: 64px 0 64px 48px;
}

/* ── Typography ── */
.wordmark {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-bottom: 16px;
}

.title {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 0.06em;
  line-height: 1.05;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--gray-3);
  margin-bottom: 64px;
}

.label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-bottom: 12px;
}

/* ── Stats Row ── */
.stats {
  display: flex;
  gap: 48px;
  margin-bottom: 48px;
}

.stat {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat__dot {
  width: 6px;
  height: 6px;
  background: var(--red);
  border-radius: 50%;
}

.stat__value {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1;
}

.stat__label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-top: 2px;
}

/* ── Divider ── */
.rule {
  height: 1px;
  background: var(--black);
  margin: 24px 0 32px;
}

.rule--thin {
  height: 1px;
  background: var(--gray-2);
  margin: 0 0 20px;
}

.rule--section {
  height: 1px;
  background: var(--black);
  margin: 48px 0 32px;
}

/* ── Keywords ── */
.keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 32px;
}

.keyword {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
  padding: 3px 10px;
  border: 1px solid var(--black);
  cursor: pointer;
  transition: background 120ms, color 120ms;
  user-select: none;
}

.keyword:hover,
.keyword--active {
  background: var(--red);
  border-color: var(--red);
  color: var(--white);
}

.keyword--add {
  border-style: dashed;
  color: var(--gray-3);
  font-weight: 400;
}

.keyword--add:hover {
  background: var(--black);
  border-color: var(--black);
  color: var(--white);
}

/* ── Feed Item ── */
.feed-list {
  display: flex;
  flex-direction: column;
}

.feed-item {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  padding: 16px 0;
  border-bottom: 1px solid var(--gray-2);
  cursor: pointer;
  transition: background 80ms;
}

.feed-item:hover {
  background: var(--gray-1);
  margin: 0 -12px;
  padding: 16px 12px;
}

.feed-item__source {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-3);
  grid-column: 1;
}

.feed-item__time {
  font-size: 10px;
  font-weight: 400;
  color: var(--gray-3);
  grid-column: 2;
  text-align: right;
}

.feed-item__title {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.35;
  margin-top: 4px;
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.feed-item__badge {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--red);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── Briefing Card ── */
.briefing {
  margin-bottom: 40px;
}

.briefing__meta {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
}

.briefing__number {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.briefing__title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.briefing__body {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  max-width: 480px;
}

/* ── Source List ── */
.source-list {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-top: 48px;
}

.source-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--gray-3);
}

.source-item__dot {
  width: 4px;
  height: 4px;
  background: var(--black);
  border-radius: 50%;
}

/* ── Modal / Add Keyword ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 150ms;
}

.modal-overlay--open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  border: 1px solid var(--black);
  background: var(--white);
  padding: 32px;
  width: 360px;
}

.modal__title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.modal__input {
  width: 100%;
  border: 1px solid var(--black);
  padding: 8px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  margin-bottom: 16px;
}

.modal__input:focus {
  border-color: var(--red);
}

.modal__actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 20px;
  border: 1px solid var(--black);
  background: var(--white);
  cursor: pointer;
  transition: background 100ms, color 100ms;
}

.btn:hover {
  background: var(--black);
  color: var(--white);
}

.btn--red {
  background: var(--red);
  border-color: var(--red);
  color: var(--white);
}

.btn--red:hover {
  background: var(--black);
  border-color: var(--black);
}

/* ── Empty State ── */
.empty {
  font-size: 13px;
  color: var(--gray-3);
  font-style: italic;
  padding: 24px 0;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--black);
  color: var(--white);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 10px 24px;
  z-index: 200;
  opacity: 0;
  transition: opacity 200ms;
}

.toast--visible {
  opacity: 1;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
  }
  .zone--left {
    grid-column: 1;
    padding: 32px 24px;
    border-right: none;
    border-bottom: 1px solid var(--black);
  }
  .zone--right {
    grid-column: 1;
    padding: 32px 24px;
  }
  .title {
    font-size: 36px;
  }
  .stats {
    gap: 24px;
  }
}

/* ── Micro-interactions ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feed-item {
  animation: fadeIn 200ms ease-out;
}
.feed-item:nth-child(1) { animation-delay: 0ms; }
.feed-item:nth-child(2) { animation-delay: 30ms; }
.feed-item:nth-child(3) { animation-delay: 60ms; }
.feed-item:nth-child(4) { animation-delay: 90ms; }
.feed-item:nth-child(5) { animation-delay: 120ms; }

.stat__value {
  transition: color 200ms;
}

.keyword {
  transition: all 120ms ease;
}

.keyword:active {
  transform: scale(0.95);
}

.feed-item:active {
  transform: scale(0.99);
}

/* ── Loading pulse ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.loading {
  animation: pulse 1.4s infinite;
}

/* ── Archive item ── */
.archive-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-2);
  cursor: pointer;
  transition: background 80ms;
}
.archive-item:hover {
  background: var(--gray-1);
  margin: 0 -12px;
  padding: 12px;
}
.archive-item__num {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.archive-item__time {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-top: 2px;
}
.archive-item__preview {
  font-size: 13px;
  color: var(--gray-3);
  margin-top: 4px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
</style>
</head>
<body>

<div class="layout">
  <!-- ── LEFT ZONE ── -->
  <div class="zone--left">
    <div class="wordmark">OpenAI Codex · Vibe Coding</div>
    <div class="title">SENTINEL</div>
    <div class="subtitle">网络哨兵 · 全网关键词监测</div>

    <div class="stats" id="stats">
      <div class="stat">
        <span class="stat__dot"></span>
        <div>
          <div class="stat__value" id="stat-total">0</div>
          <div class="stat__label">总扫描</div>
        </div>
      </div>
      <div class="stat">
        <span class="stat__dot"></span>
        <div>
          <div class="stat__value" id="stat-hits">0</div>
          <div class="stat__label">值得看</div>
        </div>
      </div>
      <div class="stat">
        <span class="stat__dot"></span>
        <div>
          <div class="stat__value" id="stat-briefings">0</div>
          <div class="stat__label">简报</div>
        </div>
      </div>
    </div>

    <div class="rule"></div>

    <div class="label">KEYWORDS</div>
    <div class="keywords" id="keywords">
      <span class="keyword keyword--add" onclick="openModal()">+ 添加</span>
    </div>

    <div class="rule"></div>

    <div class="label">SOURCES</div>
    <div class="source-list">
      <span class="source-item"><span class="source-item__dot"></span>Hacker News</span>
      <span class="source-item"><span class="source-item__dot"></span>V2EX</span>
      <span class="source-item"><span class="source-item__dot"></span>少数派</span>
      <span class="source-item"><span class="source-item__dot"></span>GitHub Trending</span>
      <span class="source-item"><span class="source-item__dot"></span>知乎</span>
      <span class="source-item"><span class="source-item__dot"></span>微博</span>
      <span class="source-item"><span class="source-item__dot"></span>B站</span>
    </div>
  </div>

  <!-- ── RIGHT ZONE ── -->
  <div class="zone--right">
    <div class="label" style="margin-bottom: 16px;display:flex;justify-content:space-between;">
      <span>值得看</span>
      <span id="feed-toggle" style="cursor:pointer;font-weight:400;letter-spacing:0.04em;" onclick="toggleFeed()">只看命中</span>
    </div>
    <div class="feed-list" id="feed">
      <div class="empty">等待数据采集...</div>
    </div>

    <div class="rule--section"></div>

    <div class="briefing" id="briefing" style="display:none">
      <div class="briefing__meta">
        <span id="briefing-time"></span>
        <div style="display:flex;gap:12px;align-items:center;">
          <span style="color:var(--red);cursor:pointer" onclick="generateBriefing()">GENERATE</span>
          <span style="cursor:pointer" onclick="toggleArchive()">ARCHIVE</span>
        </div>
      </div>
      <div class="briefing__number" id="briefing-num">#00</div>
      <div class="briefing__title">周期简报</div>
      <div class="briefing__body" id="briefing-body"></div>
    </div>

    <div id="archive" style="display:none;">
      <div class="label" style="margin-bottom: 16px;">ARCHIVE</div>
      <div id="archive-list"></div>
    </div>
  </div>
</div>

<!-- Add Keyword Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal__title">添加关键词</div>
    <input class="modal__input" id="modal-input" placeholder="输入关键词..." autofocus>
    <div class="modal__actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn--red" onclick="addKeyword()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ State ═══
let keywords = ['开源','编程','Rust','Go','JavaScript','Python','前端','后端','数据库','AI','大模型','DeepSeek','GPT','Agent','prompt','OpenAI','Figma','设计','UI','UX','创业','融资','SaaS','增长','苹果','华为','芯片','机器人','游戏','独立游戏','Steam','量子','太空','生物学','vibe coding','浏览器'];

// ═══ Render ═══
function renderKeywords() {
  const el = document.getElementById('keywords');
  el.innerHTML = keywords.map(k =>
    `<span class="keyword" onclick="toggleKeyword('${k}')">${k}</span>`
  ).join('') + `<span class="keyword keyword--add" onclick="openModal()">+ 添加</span>`;
}

function toggleKeyword(k) {
  if (confirm(`删除关键词 "${k}"？`)) {
    keywords = keywords.filter(x => x !== k);
    renderKeywords();
    toast(`已删除: ${k}`);
  }
}

function openModal() {
  document.getElementById('modal').classList.add('modal-overlay--open');
  document.getElementById('modal-input').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('modal-overlay--open');
  document.getElementById('modal-input').value = '';
}

function addKeyword() {
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;
  if (keywords.includes(val)) {
    toast('关键词已存在');
    return;
  }
  keywords.push(val);
  renderKeywords();
  closeModal();
  toast(`已添加: ${val}`);
  fetch('/api/keywords', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ keywords })
  }).catch(() => {});
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('toast--visible');
  setTimeout(() => el.classList.remove('toast--visible'), 2000);
}

async function generateBriefing() {
  toast('生成 AI 简报...');
  try {
    await fetch('/api/briefing', { method: 'POST' });
    setTimeout(() => poll(), 3000);
  } catch(e) {
    toast('简报生成失败');
  }
}

let showArchive = false;
async function toggleArchive() {
  showArchive = !showArchive;
  const archiveEl = document.getElementById('archive');
  const briefingEl = document.getElementById('briefing');
  if (showArchive) {
    briefingEl.style.display = 'none';
    archiveEl.style.display = 'block';
    try {
      const res = await fetch('/api/briefings');
      const briefings = await res.json();
      const list = document.getElementById('archive-list');
      if (briefings.length === 0) {
        list.innerHTML = '<div class="empty">暂无归档简报</div>';
      } else {
        list.innerHTML = briefings.map(b => `
          <div class="archive-item" onclick="viewBriefing(${b.id})">
            <div class="archive-item__num">#${String(b.id).padStart(2, '0')}</div>
            <div class="archive-item__time">${timeAgo(b.time)}</div>
            <div class="archive-item__preview">${escapeHtml(b.body.substring(0, 120))}...</div>
          </div>
        `).join('');
      }
    } catch(e) {}
  } else {
    archiveEl.style.display = 'none';
    briefingEl.style.display = 'block';
  }
}

function viewBriefing(id) {
  showArchive = false;
  document.getElementById('archive').style.display = 'none';
  document.getElementById('briefing').style.display = 'block';
  poll();
}

// ═══ Render Feed ═══
function renderFeed(items) {
  const el = document.getElementById('feed');
  if (!items || items.length === 0) {
    el.innerHTML = '<div class="empty">等待数据采集...</div>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="feed-item" onclick="window.open('${escapeHtml(item.link)}', '_blank')">
      <span class="feed-item__source">${escapeHtml(item.source)}</span>
      <span class="feed-item__time">${timeAgo(item.time)}</span>
      <span class="feed-item__title">
        ${item.hit ? '<span class="feed-item__badge"></span>' : ''}
        ${escapeHtml(item.title)}
      </span>
    </div>
  `).join('');
}

function renderBriefing(b) {
  if (!b) {
    document.getElementById('briefing').style.display = 'none';
    return;
  }
  document.getElementById('briefing').style.display = 'block';
  document.getElementById('briefing-time').textContent = timeAgo(b.time);
  document.getElementById('briefing-num').textContent = `#${String(b.num).padStart(2, '0')}`;
  document.getElementById('briefing-body').textContent = b.body;
}

function renderStats(total, hits, briefings) {
  document.getElementById('stat-total').textContent = total || 0;
  document.getElementById('stat-hits').textContent = hits || 0;
  document.getElementById('stat-briefings').textContent = briefings || 0;
}

// ═══ Helpers ═══
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

let showAll = false;
function toggleFeed() {
  showAll = !showAll;
  document.getElementById('feed-toggle').textContent = showAll ? '只看命中' : '显示全部';
  poll();
}

// ═══ Poll ═══
async function poll() {
  try {
    const url = showAll ? '/api/state?all=1' : '/api/state';
    const res = await fetch(url);
    const data = await res.json();
    renderStats(data.total, data.hits, data.briefings);
    renderFeed(data.feed);
    renderBriefing(data.latestBriefing);
  } catch (e) {}
}

// ═══ Init ═══
renderKeywords();
poll();
setInterval(poll, 30000);

// Modal close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Modal close on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
