<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海边自习室</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0D9488;--orange:#F97316;--text:#134E4A;--text-muted:#5B8A85}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Raleway',sans-serif;height:100vh;overflow:hidden;background:#0a1628}

/* ═══ SCENE CONTAINER ═══ */
.scene{position:fixed;inset:0;z-index:0}

/* Ocean background */
.ocean-bg{position:absolute;inset:0;overflow:hidden}
.ocean-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(1.02) saturate(1.05)}

/* ═══ WINDOW FRAME — removed: real photo has natural framing ═══ */

/* ═══ CURTAINS ═══ */
.curtains{position:absolute;inset:0;z-index:3;pointer-events:none}

.curtain{
  position:absolute;top:0;width:20%;height:110%;
  transform-origin:top center;
}

.curtain-left{left:6%}
.curtain-right{right:6%}

/* Main fabric */
.curtain-fabric{
  position:absolute;inset:0;
  background:
    linear-gradient(170deg,
      rgba(252,250,240,.88) 0%,
      rgba(248,244,230,.78) 15%,
      rgba(250,246,236,.72) 35%,
      rgba(245,240,225,.8) 55%,
      rgba(250,246,236,.72) 75%,
      rgba(248,244,230,.82) 100%
    );
  border-radius:0 0 4px 0;
  box-shadow:inset -8px 0 30px rgba(0,0,0,.03),inset -2px 0 8px rgba(0,0,0,.04),3px 0 30px rgba(0,0,0,.06);
}

/* Fabric folds */
.curtain-fabric::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(92deg,transparent 12%,rgba(0,0,0,.03) 14%,transparent 16%) no-repeat,
    linear-gradient(92deg,transparent 28%,rgba(0,0,0,.025) 30%,transparent 32%) no-repeat,
    linear-gradient(92deg,transparent 44%,rgba(0,0,0,.03) 46%,transparent 48%) no-repeat,
    linear-gradient(92deg,transparent 58%,rgba(0,0,0,.02) 60%,transparent 62%) no-repeat,
    linear-gradient(92deg,transparent 72%,rgba(0,0,0,.025) 74%,transparent 76%) no-repeat;
}

/* Light catching the fabric edge */
.curtain-fabric::after{
  content:'';position:absolute;top:0;right:0;width:4px;height:100%;
  background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.15) 50%,rgba(255,255,255,.4));
}

/* Curtain animation — gentle breeze */
.curtain-left .curtain-fabric{
  animation:breezeL 8s ease-in-out infinite;
}
.curtain-right .curtain-fabric{
  animation:breezeR 8s ease-in-out infinite;
}

@keyframes breezeL{
  0%,100%{transform:skewX(0deg) scaleX(1)}
  20%{transform:skewX(1.8deg) scaleX(1.03)}
  40%{transform:skewX(0.5deg) scaleX(1.01)}
  60%{transform:skewX(2deg) scaleX(1.04)}
  80%{transform:skewX(0.8deg) scaleX(1.02)}
}

@keyframes breezeR{
  0%,100%{transform:skewX(0deg) scaleX(1)}
  25%{transform:skewX(-1.6deg) scaleX(1.03)}
  45%{transform:skewX(-0.4deg) scaleX(1.01)}
  65%{transform:skewX(-2.2deg) scaleX(1.04)}
  85%{transform:skewX(-1deg) scaleX(1.02)}
}

/* Curtain rod */
.curtain-rod{position:absolute;top:0;left:0;right:0;height:10px;background:linear-gradient(180deg,#d8c8a8,#c4b490);border-radius:0 0 4px 4px;z-index:4;pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,.3)}

/* ═══ CONTENT ═══ */
.content{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 0}

.header{text-align:center;margin-bottom:30px;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.header h1{font-family:'Lora',serif;font-size:36px;font-weight:700;color:#fff;letter-spacing:.04em}
.quote-bar{font-size:15px;color:rgba(255,255,255,.82);font-style:italic;min-height:22px;transition:opacity .4s}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;max-width:1160px;width:100%;flex:1;align-items:start;padding-bottom:60px}

.card{
  background:rgba(240,253,250,.38);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-radius:16px;padding:30px 26px;
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 4px 24px rgba(13,148,136,.08),inset 0 1px 0 rgba(255,255,255,.4);
  transition:all .3s;
}
.card:hover{box-shadow:0 10px 32px rgba(13,148,136,.14),inset 0 1px 0 rgba(255,255,255,.45);transform:translateY(-2px);background:rgba(240,253,250,.44)}
.card h2{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:22px;display:flex;align-items:center;gap:10px}
.card h2 svg{width:20px;height:20px;color:var(--teal);flex-shrink:0}

.timer-display{font-size:62px;font-weight:300;text-align:center;letter-spacing:.06em;color:var(--text);margin-bottom:18px;font-variant-numeric:tabular-nums}
.timer-preset{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.timer-preset button{padding:7px 16px;border-radius:20px;border:1px solid rgba(13,148,136,.25);background:rgba(255,255,255,.35);cursor:pointer;font-size:13px;font-family:'Raleway',sans-serif;color:var(--text);transition:all .2s;font-weight:500}
.timer-preset button:hover,.timer-preset button.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-custom{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.timer-custom input{width:52px;text-align:center;border:1px solid rgba(13,148,136,.25);border-radius:10px;padding:6px;font-family:'Raleway',sans-serif;font-size:13px;background:rgba(255,255,255,.35);color:var(--text);outline:none}
.timer-custom input:focus{border-color:var(--teal)}
.timer-custom span{font-size:13px;color:var(--text-muted);align-self:center}
.timer-actions{display:flex;gap:10px;justify-content:center}
.timer-actions button{width:44px;height:44px;border-radius:50%;border:1px solid rgba(13,148,136,.2);background:rgba(255,255,255,.4);cursor:pointer;color:var(--teal);transition:all .2s;display:flex;align-items:center;justify-content:center}
.timer-actions button:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-actions .btn-main{width:auto;padding:0 28px;border-radius:22px;font-size:15px;font-weight:600;background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-actions .btn-main:hover{background:#0b7a72}

.noise-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.noise-row span{font-size:15px;color:var(--text);font-weight:500}
.noise-row button{border:none;background:none;cursor:pointer;color:var(--teal);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto}
.noise-row button:hover{background:rgba(13,148,136,.12)}
.noise-row button.playing{color:var(--orange)}
.noise-item input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:rgba(13,148,136,.2);border-radius:2px;outline:none;margin-bottom:8px}
.noise-item input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer}
.noise-desc{font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;opacity:.8}

.todo-input-row{display:flex;gap:8px;margin-bottom:18px}
.todo-input-row input{flex:1;border:1px solid rgba(13,148,136,.25);border-radius:10px;padding:10px 14px;font-family:'Raleway',sans-serif;font-size:14px;background:rgba(255,255,255,.35);color:var(--text);outline:none}
.todo-input-row input:focus{border-color:var(--teal)}
.todo-input-row input::placeholder{color:var(--text-muted)}
.todo-input-row button{border-radius:10px;border:none;background:var(--teal);color:#fff;padding:10px 18px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:14px;font-weight:600;transition:all .2s}
.todo-input-row button:hover{background:#0b7a72}
.todo-list{list-style:none;max-height:220px;overflow-y:auto}
.todo-list li{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;transition:background .2s;font-size:14px;color:var(--text)}
.todo-list li:hover{background:rgba(13,148,136,.06)}
.todo-list li.done span{text-decoration:line-through;color:var(--text-muted)}
.todo-list li input[type=checkbox]{accent-color:var(--teal);width:16px;height:16px;cursor:pointer}
.todo-list li span{flex:1}
.todo-list li button{border:none;background:none;cursor:pointer;color:rgba(180,130,110,.8);padding:4px 8px;border-radius:6px;transition:all .2s;display:flex}
.todo-list li button:hover{background:rgba(180,130,110,.12);color:#a06050}
.empty-todo{text-align:center;color:var(--text-muted);font-size:13px;padding:24px 0;opacity:.7}

@media(max-width:960px){.grid{grid-template-columns:1fr;max-width:440px}.header h1{font-size:28px}.timer-display{font-size:46px}.curtain{width:16%}}
@media(max-width:480px){.card{padding:22px 18px}.timer-display{font-size:36px}.header h1{font-size:24px}.curtain{width:12%}}
@media(prefers-reduced-motion:reduce){.curtain-fabric{animation:none!important}}
</style>
</head>
<body>

<div class="scene">
  <div class="ocean-bg">
    <img src="https://plus.unsplash.com/premium_photo-1749903201235-2785a01a30fc?w=1920&q=80" alt="desk ocean view"
         onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(180deg,#7eb8da,#b0d4e6,#c8e0ec,#bcd6e4,#9ec4d6)'">
  </div>
  <div class="curtain-rod"></div>
  <div class="curtains">
    <div class="curtain curtain-left"><div class="curtain-fabric"></div></div>
    <div class="curtain curtain-right"><div class="curtain-fabric"></div></div>
  </div>
</div>

<div class="content">
  <div class="header">
    <h1>海边自习室</h1>
    <div class="quote-bar" id="quote">专注当下</div>
  </div>
  <div class="grid">
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>番茄钟</h2>
      <div class="timer-display" id="timer">25:00</div>
      <div class="timer-preset">
        <button class="active" data-min="25">25分钟</button>
        <button data-min="45">45分钟</button>
        <button data-min="60">60分钟</button>
      </div>
      <div class="timer-custom"><input type="number" id="customMin" value="25" min="5" max="120"><span>分钟</span></div>
      <div class="timer-actions">
        <button class="btn-main" id="btnStart" onclick="toggleTimer()">开始</button>
        <button onclick="resetTimer()" title="重置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 4v6h6"/><path d="M3.5 16A9 9 0 102 12"/></svg></button>
      </div>
    </div>
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>海风</h2>
      <div class="noise-row">
        <span>海风与海浪</span>
        <button onclick="toggleNoise()" id="btn-noise"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="6,3 20,12 6,21"/></svg></button>
      </div>
      <input type="range" min="0" max="100" value="60" oninput="setVolume(this.value)" style="width:100%;margin-top:6px">
      <div class="noise-desc">Web Audio 生成 · 循环播放</div>
    </div>
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>待办</h2>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="添加新任务..." onkeydown="if(event.key==='Enter')addTodo()">
        <button onclick="addTodo()">添加</button>
      </div>
      <ul class="todo-list" id="todoList"><li class="empty-todo">暂无待办事项</li></ul>
    </div>
  </div>
</div>

<script>
const quotes=["专注当下","宁静致远","深呼吸，慢慢来","你可以的","少即是多","此刻即是最好的时刻","日拱一卒","不急不躁","大海带走所有杂念","安静是最强大的力量"];
function refreshQuote(){const q=quotes[Math.floor(Math.random()*quotes.length)];const el=document.getElementById('quote');el.style.opacity=0;setTimeout(()=>{el.textContent=q;el.style.opacity=1},300)}
setInterval(refreshQuote,15000);refreshQuote();

let timerSec=25*60,timerRunning=!1,timerInterval=null;
const timerEl=document.getElementById('timer'),btnStart=document.getElementById('btnStart'),customEl=document.getElementById('customMin');
function fmt(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function updateTimer(){timerEl.textContent=fmt(timerSec)}
function toggleTimer(){timerRunning?pauseTimer():startTimer()}
function startTimer(){timerRunning=!0;btnStart.textContent='暂停';timerInterval=setInterval(()=>{if(timerSec<=0){timerEnd();return}timerSec--;updateTimer()},1000)}
function pauseTimer(){timerRunning=!1;btnStart.textContent='开始';clearInterval(timerInterval)}
function resetTimer(){pauseTimer();timerSec=parseInt(customEl.value)*60;updateTimer()}
function timerEnd(){pauseTimer();try{const c=getCtx();[880,660].forEach((f,i)=>{setTimeout(()=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.value=.25;o.start();g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.5);o.stop(c.currentTime+.5)},i*600)})}catch(e){}if(Notification.permission==='granted')new Notification('休息一下吧',{body:'看看窗外的海'});setTimeout(()=>alert('🌊 休息一下吧！'),200)}
document.querySelectorAll('.timer-preset button').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.timer-preset button').forEach(x=>x.classList.remove('active'));this.classList.add('active');customEl.value=this.dataset.min;pauseTimer();timerSec=parseInt(this.dataset.min)*60;updateTimer()}));
customEl.addEventListener('change',function(){document.querySelectorAll('.timer-preset button').forEach(x=>x.classList.remove('active'));pauseTimer();timerSec=parseInt(this.value)*60;updateTimer()});
if(Notification.permission==='default')Notification.requestPermission();

let audioCtx=null,noiseNode=null,noisePlaying=!1;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
document.addEventListener('click',()=>{if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()},{once:false});
function createOceanNoise(){
  const ctx=getCtx(),sr=ctx.sampleRate,bs=4*sr;
  const b1=ctx.createBuffer(1,bs,sr),d=b1.getChannelData(0);let l=0;for(let i=0;i<d.length;i++){d[i]=(l+.008*(Math.random()*2-1))/1.008;l=d[i]}
  const b2=ctx.createBuffer(1,bs,sr),d2=b2.getChannelData(0);for(let i=0;i<d2.length;i++)d2[i]=d[i]*(.6+.4*Math.sin(i*.0008))*(.7+.3*Math.sin(i*.0015));
  const src=ctx.createBufferSource();src.buffer=b2;src.loop=true;
  const wb=ctx.createBuffer(1,bs,sr),wd=wb.getChannelData(0);l=0;for(let i=0;i<wd.length;i++){wd[i]=(l+.02*(Math.random()*2-1))/1.02;l=wd[i]}
  const ws=ctx.createBufferSource();ws.buffer=wb;ws.loop=true;const wf=ctx.createBiquadFilter();wf.type='bandpass';wf.frequency.value=400;wf.Q.value=.3;
  const g=ctx.createGain();g.gain.value=.5;const wg=ctx.createGain();wg.gain.value=.25;const mg=ctx.createGain();mg.gain.value=.6;
  src.connect(g);g.connect(mg);ws.connect(wf);wf.connect(wg);wg.connect(mg);mg.connect(ctx.destination);return{src,ws,mg};
}
function toggleNoise(){
  const btn=document.getElementById('btn-noise');
  if(noisePlaying){if(noiseNode){try{noiseNode.src.stop()}catch(e){}try{noiseNode.ws.stop()}catch(e){}noiseNode=null}noisePlaying=!1;btn.classList.remove('playing');btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="6,3 20,12 6,21"/></svg>'}
  else{const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();noiseNode=createOceanNoise();noiseNode.src.start();noiseNode.ws.start();noisePlaying=!0;btn.classList.add('playing');btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><rect x="6" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>'}
}
function setVolume(v){if(noiseNode)noiseNode.mg.gain.value=v/100}

let todos=JSON.parse(localStorage.getItem('seaTodos4')||'[]');
function saveTodos(){localStorage.setItem('seaTodos4',JSON.stringify(todos));renderTodos()}
function renderTodos(){const el=document.getElementById('todoList');if(!todos.length){el.innerHTML='<li class="empty-todo">暂无待办事项</li>';return}el.innerHTML=todos.map((t,i)=>`<li class="${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})"><span>${esc(t.text)}</span><button onclick="delTodo(${i})" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></li>`).join('')}
function addTodo(){const inp=document.getElementById('todoInput');const text=inp.value.trim();if(!text)return;todos.push({text,done:!1});inp.value='';saveTodos()}
function toggleTodo(i){todos[i].done=!todos[i].done;saveTodos()}
function delTodo(i){todos.splice(i,1);saveTodos()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
renderTodos();
</script>
</body>
</html>
