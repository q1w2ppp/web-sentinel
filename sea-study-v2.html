<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海边自习室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0D9488;--teal-light:#14B8A6;--teal-bg:#F0FDFA;--orange:#F97316;--text:#134E4A;--text-muted:#5B8A85;--card-bg:rgba(240,253,250,.5);--card-border:rgba(13,148,136,.15);--shadow:0 2px 16px rgba(13,148,136,.06)}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Raleway',sans-serif;overflow:hidden;height:100vh;background:#0a1628}

/* ═══ SCENE ═══ */
.scene{position:fixed;inset:0;z-index:0}
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#7eb8da 0%,#b0d4e6 30%,#c8e0ec 55%,#bcd6e4 75%,#9ec4d6 100%)}
.ocean{position:absolute;bottom:0;left:0;right:0;height:45%}
.ocean-base{position:absolute;inset:0;background:linear-gradient(180deg,#3d8a7a 0%,#2d7a6a 30%,#1d6a5a 60%,#0d5a4a 100%)}
.ocean-shimmer{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.04) 30%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 70%,transparent 100%);animation:shimmer 8s ease-in-out infinite}
.ocean-sparkle{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 40%,rgba(255,255,255,.1) 0%,transparent 50%),radial-gradient(ellipse at 60% 35%,rgba(255,255,255,.07) 0%,transparent 40%),radial-gradient(ellipse at 80% 45%,rgba(255,255,255,.08) 0%,transparent 45%),radial-gradient(ellipse at 35% 50%,rgba(255,255,255,.05) 0%,transparent 35%);animation:sparkle 6s ease-in-out infinite alternate}
.ocean-line{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.25);box-shadow:0 0 16px rgba(255,255,255,.1)}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes sparkle{0%{opacity:.4;transform:translateY(0)}100%{opacity:.8;transform:translateY(-3px)}}

.window-frame{position:absolute;top:5%;left:10%;right:10%;bottom:5%;border:12px solid #f5ebe0;border-radius:4px;box-shadow:inset 0 0 80px rgba(0,0,0,.15),0 0 0 4px #d4c4a8,0 0 0 16px #f5ebe0,0 0 0 20px #c4b494;z-index:2;overflow:hidden;pointer-events:none}

.curtain-rod{position:absolute;top:4%;left:9%;right:9%;height:6px;background:linear-gradient(180deg,#d4c4a8,#c4b494);z-index:4;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.curtain{position:absolute;top:5%;bottom:5%;width:18%;z-index:3;pointer-events:none;transform-origin:top center}
.curtain-left{left:10%}.curtain-right{right:10%}
.curtain-fabric{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,250,240,.82) 0%,rgba(255,248,238,.65) 30%,rgba(252,245,232,.6) 50%,rgba(255,248,238,.65) 70%,rgba(255,250,240,.82) 100%);border-radius:0 0 2px 2px;animation:curtainSway 7s ease-in-out infinite}
.curtain-right .curtain-fabric{animation-delay:3.5s}
.curtain-fold{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0%,transparent 8%,rgba(0,0,0,.02) 8%,rgba(0,0,0,.02) 10%,transparent 10%,transparent 18%);animation:curtainSway 7s ease-in-out infinite}
.curtain-right .curtain-fold{animation-delay:3.5s}
@keyframes curtainSway{0%,100%{transform:skewX(0deg) scaleX(1)}25%{transform:skewX(1.5deg) scaleX(1.02)}50%{transform:skewX(0deg) scaleX(1)}75%{transform:skewX(-1.5deg) scaleX(1.02)}}

.desk{position:absolute;bottom:0;left:0;right:0;height:22%;z-index:5;pointer-events:none}
.desk-surface{position:absolute;bottom:0;left:5%;right:5%;height:40%;background:linear-gradient(180deg,#c4a882,#b89872);border-radius:4px 4px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,.2)}
.desk-front{position:absolute;bottom:0;left:5%;right:5%;height:60%;background:linear-gradient(180deg,#a08060,#8a6a4a)}
.desk-items{position:absolute;bottom:30%;left:8%;right:8%;height:50%;z-index:6;pointer-events:none;display:flex;align-items:flex-end;gap:30px;padding:0 20px}
.book{width:36px;height:50px;background:#e8d5c0;border-radius:2px;box-shadow:1px 1px 3px rgba(0,0,0,.3)}
.book:nth-child(2){height:44px;background:#d4c4a8}
.book:nth-child(3){height:48px;background:#e0ccc0;width:32px}
.lamp{display:flex;flex-direction:column;align-items:center;position:relative}
.lamp-base{width:28px;height:6px;background:#5a4a3a;border-radius:3px}
.lamp-pole{width:4px;height:30px;background:#6a5a4a}
.lamp-shade{width:40px;height:18px;background:linear-gradient(180deg,#f0e8c0,#e8d8a0);clip-path:polygon(20% 0%,80% 0%,100% 100%,0% 100%);margin-top:-2px}
.lamp-glow{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:60px;height:40px;background:radial-gradient(ellipse at center,rgba(255,240,200,.4) 0%,transparent 70%);animation:lampGlow 3s ease-in-out infinite}
@keyframes lampGlow{0%,100%{opacity:.4;transform:translateX(-50%) scale(1)}50%{opacity:.7;transform:translateX(-50%) scale(1.12)}}
.pen{width:3px;height:35px;background:#3a3a3a;border-radius:1px;transform:rotate(15deg);margin-left:-10px}

/* ═══ CONTENT ═══ */
.content{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px}

.header{text-align:center;margin-bottom:22px}
.header h1{font-family:'Lora',serif;font-size:38px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.3);letter-spacing:.02em}
.quote-bar{font-size:14px;color:rgba(255,255,255,.8);font-style:italic;min-height:20px;transition:opacity .4s;text-shadow:0 1px 4px rgba(0,0,0,.3)}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;max-width:1120px;width:100%;margin:0 auto;flex:1;align-items:start}

.card{background:var(--card-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:16px;padding:28px 26px;border:1px solid var(--card-border);box-shadow:var(--shadow);transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 8px 32px rgba(13,148,136,.12);transform:translateY(-1px)}
.card h2{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.card h2 svg{width:18px;height:18px;color:var(--teal);flex-shrink:0}

.timer-display{font-size:58px;font-weight:300;text-align:center;letter-spacing:.04em;color:var(--text);margin-bottom:16px;font-variant-numeric:tabular-nums;font-family:'Raleway',sans-serif}
.timer-preset{display:flex;gap:6px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.timer-preset button{padding:6px 14px;border-radius:20px;border:1px solid rgba(13,148,136,.3);background:rgba(240,253,250,.4);cursor:pointer;font-size:12px;font-family:'Raleway',sans-serif;color:var(--text);transition:all .2s;font-weight:500}
.timer-preset button:hover,.timer-preset button.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-custom{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.timer-custom input{width:48px;text-align:center;border:1px solid rgba(13,148,136,.3);border-radius:10px;padding:5px;font-family:'Raleway',sans-serif;font-size:13px;background:rgba(240,253,250,.4);color:var(--text);outline:none}
.timer-custom input:focus{border-color:var(--teal)}
.timer-custom span{font-size:12px;color:var(--text-muted);align-self:center}
.timer-actions{display:flex;gap:8px;justify-content:center}
.timer-actions button{width:42px;height:42px;border-radius:50%;border:1px solid rgba(13,148,136,.25);background:rgba(240,253,250,.5);cursor:pointer;font-size:16px;color:var(--teal);transition:all .2s}
.timer-actions button:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-actions .btn-main{width:auto;padding:0 24px;border-radius:21px;font-size:14px;font-weight:600;background:var(--teal);color:#fff;border-color:var(--teal)}
.timer-actions .btn-main:hover{background:#0b7a72}

.noise-item{margin-bottom:6px}
.noise-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.noise-row svg{width:20px;height:20px;color:var(--teal);flex-shrink:0}
.noise-row span{font-size:14px;color:var(--text);font-weight:500}
.noise-row button{border:none;background:none;cursor:pointer;font-size:16px;color:var(--teal);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto}
.noise-row button:hover{background:rgba(13,148,136,.12)}
.noise-row button.playing{color:var(--orange)}
.noise-item input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:rgba(13,148,136,.2);border-radius:2px;outline:none;margin-bottom:6px}
.noise-item input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer}
.noise-desc{font-size:11px;color:var(--text-muted);text-align:center;margin-top:6px;font-style:italic}

.todo-input-row{display:flex;gap:8px;margin-bottom:16px}
.todo-input-row input{flex:1;border:1px solid rgba(13,148,136,.3);border-radius:10px;padding:9px 14px;font-family:'Raleway',sans-serif;font-size:13px;background:rgba(240,253,250,.4);color:var(--text);outline:none}
.todo-input-row input:focus{border-color:var(--teal)}
.todo-input-row button{border-radius:10px;border:none;background:var(--teal);color:#fff;padding:9px 16px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.todo-input-row button:hover{background:#0b7a72}
.todo-list{list-style:none;max-height:200px;overflow-y:auto}
.todo-list li{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;transition:background .2s;font-size:13px;color:var(--text)}
.todo-list li:hover{background:rgba(13,148,136,.06)}
.todo-list li.done span{text-decoration:line-through;color:var(--text-muted)}
.todo-list li input[type=checkbox]{accent-color:var(--teal);width:15px;height:15px;cursor:pointer}
.todo-list li span{flex:1}
.todo-list li button{border:none;background:none;cursor:pointer;color:rgba(200,150,130,.8);font-size:12px;padding:3px 6px;border-radius:6px;transition:all .2s}
.todo-list li button:hover{background:rgba(200,150,130,.12);color:#a06050}
.empty-todo{text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0}

@media(max-width:960px){
  .grid{grid-template-columns:1fr;max-width:420px}
  .header h1{font-size:28px}.timer-display{font-size:44px}
  .curtain{width:14%}.curtain-l{left:12%}.curtain-r{right:12%}
  .window-frame{top:8%;left:12%;right:12%;bottom:8%;border-width:8px}
}
@media(max-width:480px){
  .card{padding:20px 16px}.timer-display{font-size:34px}
  .curtain{width:10%}.desk-items{gap:16px}
  .book{width:24px;height:36px}.book:nth-child(2){height:30px}.book:nth-child(3){height:34px}
}
@media(prefers-reduced-motion:reduce){.curtain-fabric,.curtain-fold,.ocean-shimmer,.ocean-sparkle,.lamp-glow{animation:none}}
</style>
</head>
<body>

<div class="scene">
  <div class="sky"></div>
  <div class="ocean"><div class="ocean-base"></div><div class="ocean-shimmer"></div><div class="ocean-sparkle"></div><div class="ocean-line"></div></div>
  <div class="window-frame"></div>
  <div class="curtain-rod"></div>
  <div class="curtain curtain-left"><div class="curtain-fabric"></div><div class="curtain-fold"></div></div>
  <div class="curtain curtain-right"><div class="curtain-fabric"></div><div class="curtain-fold"></div></div>
  <div class="desk"><div class="desk-surface"></div><div class="desk-front"></div></div>
  <div class="desk-items">
    <div class="book"></div><div class="book"></div><div class="book"></div>
    <div class="pen"></div>
    <div class="lamp"><div class="lamp-shade"></div><div class="lamp-pole"></div><div class="lamp-base"></div><div class="lamp-glow"></div></div>
  </div>
</div>

<div class="content">
  <div class="header">
    <h1>海边自习室</h1>
    <div class="quote-bar" id="quote">专注当下</div>
  </div>
  <div class="grid">
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>番茄钟</h2>
      <div class="timer-display" id="timer">25:00</div>
      <div class="timer-preset">
        <button class="active" data-min="25">25分钟</button>
        <button data-min="45">45分钟</button>
        <button data-min="60">60分钟</button>
      </div>
      <div class="timer-custom">
        <input type="number" id="customMin" value="25" min="5" max="120"><span>分钟</span>
      </div>
      <div class="timer-actions">
        <button class="btn-main" id="btnStart" onclick="toggleTimer()">开始</button>
        <button onclick="resetTimer()" title="重置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 4v6h6"/><path d="M3.5 16A9 9 0 102 12"/></svg></button>
      </div>
    </div>

    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>海风</h2>
      <div class="noise-item">
        <div class="noise-row">
          <span>海风与海浪</span>
          <button onclick="toggleNoise()" id="btn-noise"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><polygon points="6,3 20,12 6,21"/></svg></button>
        </div>
        <input type="range" min="0" max="100" value="60" oninput="setVolume(this.value)">
        <div class="noise-desc">Web Audio · 不依赖网络</div>
      </div>
    </div>

    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>待办</h2>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="添加新任务..." onkeydown="if(event.key==='Enter')addTodo()">
        <button onclick="addTodo()">添加</button>
      </div>
      <ul class="todo-list" id="todoList"><li class="empty-todo">暂无待办事项</li></ul>
    </div>
  </div>
</div>

<script>
const quotes=["专注当下","宁静致远","深呼吸，慢慢来","你可以的","少即是多","此刻即是最好的时刻","日拱一卒","不急不躁","大海带走所有杂念","安静是最强大的力量"];
function refreshQuote(){const q=quotes[Math.floor(Math.random()*quotes.length)];const el=document.getElementById('quote');el.style.opacity=0;setTimeout(()=>{el.textContent=q;el.style.opacity=1},300)}
setInterval(refreshQuote,15000);refreshQuote();

let timerSec=25*60,timerRunning=!1,timerInterval=null;
const timerEl=document.getElementById('timer'),btnStart=document.getElementById('btnStart'),customEl=document.getElementById('customMin');
function fmt(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function updateTimer(){timerEl.textContent=fmt(timerSec)}
function toggleTimer(){timerRunning?pauseTimer():startTimer()}
function startTimer(){timerRunning=!0;btnStart.textContent='暂停';timerInterval=setInterval(()=>{if(timerSec<=0){timerEnd();return}timerSec--;updateTimer()},1000)}
function pauseTimer(){timerRunning=!1;btnStart.textContent='开始';clearInterval(timerInterval)}
function resetTimer(){pauseTimer();timerSec=parseInt(customEl.value)*60;updateTimer()}
function timerEnd(){pauseTimer();try{const c=getCtx();[880,660].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.value=.3;o.start(c.currentTime+i*.7);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+i*.7+.5);o.stop(c.currentTime+i*.7+.5)})}catch(e){}if(Notification.permission==='granted')new Notification('休息一下吧',{body:'专注时间结束，看看窗外的大海'});setTimeout(()=>alert('🌊 休息一下吧！'),100)}
document.querySelectorAll('.timer-preset button').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.timer-preset button').forEach(x=>x.classList.remove('active'));this.classList.add('active');const min=parseInt(this.dataset.min);customEl.value=min;pauseTimer();timerSec=min*60;updateTimer()})});
customEl.addEventListener('change',function(){document.querySelectorAll('.timer-preset button').forEach(x=>x.classList.remove('active'));pauseTimer();timerSec=parseInt(this.value)*60;updateTimer()});
if(Notification.permission==='default')Notification.requestPermission();

let audioCtx=null,noiseNode=null,noisePlaying=!1;
function getCtx(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}return audioCtx}
document.addEventListener('click',()=>{if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()},{once:false});
function createOceanNoise(){
  const ctx=getCtx();const sr=ctx.sampleRate,bs=4*sr;
  const buf=ctx.createBuffer(1,bs,sr),d=buf.getChannelData(0);
  let last=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(last+.008*w)/1.008;last=d[i]}
  const buf2=ctx.createBuffer(1,bs,sr),d2=buf2.getChannelData(0);
  for(let i=0;i<d2.length;i++)d2[i]=d[i]*(.6+.4*Math.sin(i*.0008))*(.7+.3*Math.sin(i*.0015));
  const src=ctx.createBufferSource();src.buffer=buf2;src.loop=true;
  const wBuf=ctx.createBuffer(1,bs,sr),wd=wBuf.getChannelData(0);
  let wl=0;for(let i=0;i<wd.length;i++){const w=Math.random()*2-1;wd[i]=(wl+.02*w)/1.02;wl=wd[i]}
  const wsrc=ctx.createBufferSource();wsrc.buffer=wBuf;wsrc.loop=true;
  const wf=ctx.createBiquadFilter();wf.type='bandpass';wf.frequency.value=400;wf.Q.value=.3;
  const g=ctx.createGain();g.gain.value=.5;const wg=ctx.createGain();wg.gain.value=.25;const mg=ctx.createGain();mg.gain.value=.6;
  src.connect(g);g.connect(mg);wsrc.connect(wf);wf.connect(wg);wg.connect(mg);mg.connect(ctx.destination);
  return{src,wsrc,mg};
}
function toggleNoise(){
  const btn=document.getElementById('btn-noise');
  if(noisePlaying){if(noiseNode){try{noiseNode.src.stop()}catch(e){}try{noiseNode.wsrc.stop()}catch(e){}noiseNode=null}noisePlaying=!1;btn.classList.remove('playing');btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><polygon points="6,3 20,12 6,21"/></svg>'}
  else{const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();noiseNode=createOceanNoise();noiseNode.src.start();noiseNode.wsrc.start();noisePlaying=!0;btn.classList.add('playing');btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'}
}
function setVolume(v){if(noiseNode)noiseNode.mg.gain.value=v/100}

let todos=JSON.parse(localStorage.getItem('seaTodos2')||'[]');
function saveTodos(){localStorage.setItem('seaTodos2',JSON.stringify(todos));renderTodos()}
function renderTodos(){const el=document.getElementById('todoList');if(!todos.length){el.innerHTML='<li class="empty-todo">暂无待办事项</li>';return}el.innerHTML=todos.map((t,i)=>`<li class="${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})"><span>${esc(t.text)}</span><button onclick="delTodo(${i})" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></li>`).join('')}
function addTodo(){const inp=document.getElementById('todoInput');const text=inp.value.trim();if(!text)return;todos.push({text,done:!1});inp.value='';saveTodos()}
function toggleTodo(i){todos[i].done=!todos[i].done;saveTodos()}
function delTodo(i){todos.splice(i,1);saveTodos()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
renderTodos();
</script>
</body>
</html>
