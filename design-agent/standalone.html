<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计智能体 · Design Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,sans-serif;background:#1a1a20;color:#e0e0ee;min-height:100vh;display:flex;flex-direction:column}
.header{background:#22222c;padding:14px 24px;text-align:center;border-bottom:1px solid #333344}
.header h1{font-size:1rem;color:#c4a0ff}
.chat{flex:1;max-width:720px;margin:0 auto;width:100%;padding:16px;overflow-y:auto;max-height:calc(100vh-130px);display:flex;flex-direction:column;gap:12px}
.msg{padding:12px 16px;border-radius:12px;max-width:90%;line-height:1.7;font-size:.85rem;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#c4a0ff;color:#1a1a20}
.msg.bot{align-self:flex-start;background:#22222c;border:1px solid #333344;color:#c0c0d0}
.msg.thinking{align-self:flex-start;color:#d4af37;font-size:.75rem;border:none;background:none;padding:8px 0}
.input-row{display:flex;gap:8px;padding:12px 16px;max-width:720px;margin:0 auto;width:100%}
.input-row input{flex:1;padding:12px;background:#22222c;border:1px solid #333344;border-radius:10px;color:#e0e0ee;font-size:.85rem;font-family:inherit;outline:none}
.input-row input:focus{border-color:#c4a0ff}
.input-row button{padding:12px 20px;background:#c4a0ff;color:#1a1a20;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:background .2s}
.input-row button:hover{background:#b890f0}
.upload-btn{padding:12px 16px;background:#333344;color:#e0e0ee;border:none;border-radius:10px;cursor:pointer;font-size:.8rem}
</style>
</head>
<body>
<div class="header"><h1>🧠 设计智能体 · Design Agent</h1></div>
<div class="chat" id="chatBox">
  <div class="msg bot">我是设计智能体。可以帮你：<br>🔍 查灵感——找参考作品和设计师<br>🧬 拆作品——分析视觉策略<br>💡 出方向——生成创意方案<br>🎯 比比赛——推荐适合的设计比赛<br>🧐 审设计——按设计理论逐项检查<br><br>直接告诉我你想做什么。</div>
</div>
<div class="input-row">
  <button class="upload-btn" onclick="document.getElementById('imgInput').click()">📷</button>
  <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="uploadImage()">
  <input type="text" id="q" placeholder="例如：我想做一张海洋环保海报" autofocus onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">发送</button>
</div>

<script>
const KB=`# 设计知识库

## 20位设计师体系
| ID | 姓名 | 标签 | 核心策略 | 擅长 |
| paula-scher | 保拉·谢尔 | 后现代/信息密度/文字即图形 | 文字填充空间 | 品牌/海报/出版 |
| kenya-hara | 原研哉 | 极简/空寂/东方美学 | 留白即信息 | 生活方式/文化/包装 |
| stefan-sagmeister | 施德明 | 概念驱动/实验/身体艺术 | 用身体当画布 | 实验海报/音乐/艺术书 |
| otl-aicher | 奥托·艾舍 | 系统设计/图标/网格 | 模块化思维 | 导视/图标/企业 |
| david-carson | 大卫·卡森 | 解构/反设计/实验排版 | 打破网格 | 音乐/杂志/青年 |
| tanaka | 田中一光 | 日本传统/几何化/东西融合 | 传统纹样几何化 | 文化/和风/出版 |
| jessica-walsh | Jessica Walsh | 超现实/粉色美学/手工感 | 实物造景 | 时尚/美妆/艺术 |
| herb-lubalin | Herb Lubalin | 字体大师/Logo即字 | 字体连字设计 | Logo/字体标识 |
| tadanori-yokoo | 横尾忠则 | 迷幻/拼贴/日本波普 | 图像拼贴 | 音乐/艺术/批判 |
| josef-muller-brockmann | 穆勒-布罗克曼 | 瑞士国际/网格/数学美学 | 网格即一切 | 海报/出版/展览 |
| neville-brody | Neville Brody | 实验字体/后朋克 | 字体实验 | 音乐/时尚/数字 |
| tibor-kalman | Tibor Kalman | 社会设计/反消费主义 | 用设计讲社会议题 | 社会运动/NGO |
| irma-boom | Irma Boom | 书籍设计/材质叙事 | 书即物体 | 书籍/画册/文化 |
| henry-steiner | Henry Steiner | 跨文化/中西融合 | 东西符号混用 | 亚洲品牌/银行 |
| michael-bierut | Michael Bierut | 大众设计/叙事/实用主义 | 清晰的叙事线 | 大型机构/公共 |

## 15件获奖作品
| ID | 作品 | 比赛 | 设计策略 | 参考设计师 |
| w001 | Plastic Ocean | D&AD石墨铅笔 | 用废弃塑料纹理模拟濒危海洋生物 | 施德明 |
| w002 | Muji Horizons | iF金质奖 | 收集全球用户窗前景色做成书 | 原研哉 |
| w003 | Beethoven 250th | Red Dot最佳 | 几何圆形模拟交响乐乐谱结构 | 穆勒-布罗克曼 |
| w004 | Ray Gun Issue 39 | AIGA封面 | 采访回答乱序排版 | 大卫·卡森 |
| w005 | Public Theater | Cannes金狮 | 街头粗体字占据所有空间 | 保拉·谢尔 |
| w006 | Nihon Buyo | Tokyo TDC大奖 | 传统舞伎脸做几何抽象 | 田中一光 |
| w007 | Things I Learned | D&AD黄铅笔 | 格言用实体造字方式书写 | 施德明 |
| w008 | Macintosh Icons 1984 | 终身成就 | 日常物体做计算机图标 | Susan Kare |
| w009 | SHV Think Book | 世界最美书 | 2136页不分章节不标页码 | Irma Boom |
| w010 | Munich 1972 Olympic | iF世纪设计 | 数学网格+彩色光谱做运动图标 | 奥托·艾舍 |
| w011 | Colors Race | D&AD杂志 | 不写文章只用肖像摄影 | Tibor Kalman |
| w012 | HSBC六角形 | Red Dot品牌 | 六角形框统一全球分行 | Henry Steiner |
| w013 | Hillary 2016 | AIGA政治 | H+红色箭头的极简符号 | Michael Bierut |
| w014 | Mother&Child 1965 | TDC年度 | Mother&的连字设计 | Herb Lubalin |
| w015 | John Lennon海报 | Cannes文化 | 拼贴爆炸把失去变成绚丽 | 横尾忠则 |

## 5个比赛权重
Red Dot: 概念30%·执行40%·创新30%——偏好商业系统创新
D&AD: 概念50%·执行20%·创新30%——偏好大胆实验社会议题
Cannes Lions: 概念35%·执行25%·创新40%——偏好品牌叙事大众传播
Tokyo TDC: 概念25%·执行45%·创新30%——偏好字体创新东方审美
iF Design: 概念20%·执行50%·创新30%——偏好系统完整商业可行

## 设计理论审查清单(分致命/重要/建议)
网格: [致命]基线对齐 [重要]跨栏完整 [建议]留白整数倍
格式塔: [致命]信息靠近性 [重要]视觉区分 [致命]第一眼焦点
动线: [致命]2秒找到主焦点 [重要]无干扰元素
字体: [致命]≤3种字号 [重要]行高≥1.4倍 [致命]对比度≥4.5:1 [建议]避开13/15/17px
色彩: [重要]主色≤3个 [致命]语义匹配主题 [重要]色盲不可分辨`;

let hist=[];

function add(text,role){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=text;
  chatBox.appendChild(d);
  chatBox.scrollTop=chatBox.scrollHeight;
}

async function uploadImage(){
  const file=document.getElementById('imgInput').files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(){
    const base64=reader.result.split(',')[1];
    add('📷 图片已上传，正在分析...','user');
    const t=document.createElement('div');t.className='msg thinking';t.textContent='分析图片中...';chatBox.appendChild(t);
    const r=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer sk-45859cf6b09c4d46acc71fdad1cfc68f'},
      body:JSON.stringify({model:'deepseek-chat',messages:[
        {role:'system',content:'你是设计评论家。用户上传了一张设计作品图片，请你先描述你看到的内容（不评价只描述），然后分析设计风格，最后推荐2-3位风格相关的设计师并说明为什么。150-300字。知识库：'+KB},
        {role:'user',content:'请分析这张设计作品的风格'}
      ],temperature:0.7,max_tokens:500})
    });
    t.remove();const d=await r.json();add(d.choices[0].message.content,'bot');
  };
  reader.readAsDataURL(file);
}

async function send(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('q').value='';
  add(q,'user');
  const t=document.createElement('div');t.className='msg thinking';t.textContent='思考中...';chatBox.appendChild(t);
  hist.push({role:'user',content:q});

  const system=`你是设计智能顾问。根据知识库提供专业设计分析。行为规则：
1. 用户说"参考""灵感""我想做"→推荐2-3件相关作品+2位匹配设计师(说明为什么匹配)
2. 用户说"分析""拆解"→从概念/视觉/排版/色彩四维度拆解，给出设计推理链
3. 用户说"方向""思路"→生成3个具体创意方向(不要固定模板，每个方向含策略+视觉关键词+参考设计师+风险提示)
4. 用户说"比赛""参赛"→推荐比赛+匹配理由+风险提示
5. 用户说"审""检查""问题"→按审查清单逐项对照(分致命/重要/建议)，列出前3条优先修改项
6. 不说"你可以这样""值得注意的是"→直接给结论
7. 不知道就说不知道，绝对不编造
知识库：${KB}`;

  const r=await fetch('https://api.deepseek.com/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer sk-45859cf6b09c4d46acc71fdad1cfc68f'},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:system},...hist.slice(-10)],temperature:0.7,max_tokens:800})
  });
  t.remove();const d=await r.json();const ans=d.choices[0].message.content;
  add(ans,'bot');hist.push({role:'assistant',content:ans});
}
</script>
</body>
</html>
